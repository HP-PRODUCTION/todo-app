<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A fully-featured To-Do app with priorities, categories, due dates and dark mode." />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="color-scheme" content="light dark" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Todo App</title>

  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/dark-mode.css" />
</head>
<body>
<div class="app-wrapper">

  <!-- ══════════════════════════════════════════════
       Header
       ══════════════════════════════════════════════ -->
  <header class="app-header">
    <div class="container">
      <div class="header-inner">

        <a class="app-logo" href="#" aria-label="Todo App home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Todo App
        </a>

        <div class="header-actions">
          <button id="export-btn" class="btn btn-ghost btn-sm" aria-label="Export backup">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span>Export</span>
          </button>

          <button id="import-btn" class="btn btn-ghost btn-sm" aria-label="Import backup">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span>Import</span>
          </button>
          <input id="import-file" type="file" accept=".json" class="hidden" aria-hidden="true" />

          <button id="theme-toggle" class="btn-icon" aria-label="Switch to dark mode" title="Dark mode">
            <!-- Icon injected by ui.js -->
          </button>
        </div>

      </div>
    </div>
  </header><!-- /header -->


  <!-- ══════════════════════════════════════════════
       Main
       ══════════════════════════════════════════════ -->
  <main>
    <div class="container">
      <div class="main-layout">

        <!-- ── Sidebar ──────────────────────────────── -->
        <aside class="sidebar" aria-label="Sidebar">

          <!-- Add / Edit Task Form -->
          <section class="card" aria-labelledby="form-heading">
            <h2 id="form-heading" class="card-title">New Task</h2>
            <form id="task-form" novalidate>

              <div class="form-group">
                <label for="task-title">Title <span aria-hidden="true">*</span></label>
                <input id="task-title" class="form-control" type="text"
                       placeholder="What needs to be done?" maxlength="120" required />
              </div>

              <div class="form-group">
                <label for="task-desc">Description</label>
                <textarea id="task-desc" class="form-control" rows="2"
                          placeholder="Optional details…" maxlength="400"></textarea>
              </div>

              <div class="form-group">
                <label for="task-priority">Priority</label>
                <select id="task-priority" class="form-control">
                  <option value="low">🟢 Low</option>
                  <option value="medium" selected>🟡 Medium</option>
                  <option value="high">🔴 High</option>
                </select>
              </div>

              <div class="form-group">
                <label for="task-category">Category</label>
                <input id="task-category" class="form-control" type="text"
                       placeholder="e.g. Work, Personal…" maxlength="40" list="category-suggestions" />
                <datalist id="category-suggestions">
                  <option value="Personal"></option>
                  <option value="Work"></option>
                  <option value="Shopping"></option>
                  <option value="Health"></option>
                  <option value="Finance"></option>
                </datalist>
              </div>

              <div class="form-group">
                <label for="task-due-date">Due Date</label>
                <input id="task-due-date" class="form-control" type="date" />
              </div>

              <div class="form-actions">
                <button id="form-submit-btn" type="submit" class="btn btn-primary btn-full">
                  Add Task
                </button>
                <button id="form-cancel-btn" type="button" class="btn btn-ghost hidden">
                  Cancel
                </button>
              </div>

            </form>
          </section><!-- /Add task -->


          <!-- Statistics -->
          <section class="card" aria-labelledby="stats-heading">
            <h2 id="stats-heading" class="card-title">Statistics</h2>

            <div class="stats-grid">
              <div class="stat-item">
                <div id="stat-total" class="stat-value">0</div>
                <div class="stat-label">Total</div>
              </div>
              <div class="stat-item">
                <div id="stat-completed" class="stat-value">0</div>
                <div class="stat-label">Completed</div>
              </div>
              <div class="stat-item">
                <div id="stat-pct" class="stat-value">0%</div>
                <div class="stat-label">Done</div>
              </div>
              <div class="stat-item stat-overdue">
                <div id="stat-overdue" class="stat-value">0</div>
                <div class="stat-label">Overdue</div>
              </div>
            </div>

            <div class="progress-wrap" aria-label="Completion progress">
              <div class="progress-header">
                <span>Progress</span>
                <span id="stat-pct-label">0%</span>
              </div>
              <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                   aria-valuenow="0" aria-label="Completion percentage">
                <div id="progress-bar" class="progress-bar"></div>
              </div>
            </div>

            <div class="priority-breakdown" aria-label="Tasks by priority">
              <div class="priority-stat high">
                <span id="stat-high" class="count">0</span>High
              </div>
              <div class="priority-stat medium">
                <span id="stat-medium" class="count">0</span>Med
              </div>
              <div class="priority-stat low">
                <span id="stat-low" class="count">0</span>Low
              </div>
            </div>

          </section><!-- /Statistics -->


          <!-- Filters -->
          <section class="card" aria-labelledby="filters-heading">
            <h2 id="filters-heading" class="card-title">Filters</h2>

            <div>
              <p class="form-group" style="font-size:.8125rem;color:var(--clr-text-muted);margin-bottom:.3rem;">Status</p>
              <div class="filter-group" role="group" aria-label="Filter by status">
                <button class="filter-btn active" data-filter-status="all">All</button>
                <button class="filter-btn" data-filter-status="active">Active</button>
                <button class="filter-btn" data-filter-status="completed">Completed</button>
              </div>
            </div>

            <div style="margin-top:.75rem;">
              <p class="form-group" style="font-size:.8125rem;color:var(--clr-text-muted);margin-bottom:.3rem;">Priority</p>
              <div class="filter-group" role="group" aria-label="Filter by priority">
                <button class="filter-btn active" data-filter-priority="all">All</button>
                <button class="filter-btn" data-filter-priority="high">High</button>
                <button class="filter-btn" data-filter-priority="medium">Med</button>
                <button class="filter-btn" data-filter-priority="low">Low</button>
              </div>
            </div>

            <div class="form-group" style="margin-top:.75rem;">
              <label for="category-filter" style="font-size:.8125rem;color:var(--clr-text-muted);">Category</label>
              <select id="category-filter" class="form-control">
                <option value="all">All Categories</option>
              </select>
            </div>

            <button id="clear-filters-btn" class="btn btn-ghost btn-sm btn-full" style="margin-top:.5rem;">
              Clear Filters
            </button>

          </section><!-- /Filters -->


          <!-- Danger zone -->
          <section class="card">
            <h2 class="card-title">Actions</h2>
            <button id="delete-completed-btn" class="btn btn-danger btn-sm btn-full">
              Delete Completed
            </button>
          </section>

        </aside><!-- /sidebar -->


        <!-- ── Main content ─────────────────────────── -->
        <div class="main-content">

          <!-- Toolbar -->
          <div class="toolbar">
            <div class="toolbar-left">
              <div class="search-wrap">
                <span class="search-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                       stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                  </svg>
                </span>
                <input id="search-input" class="form-control search-input"
                       type="search" placeholder="Search tasks…" aria-label="Search tasks" />
              </div>
            </div>

            <div class="toolbar-right">
              <label for="sort-select" class="visually-hidden">Sort by</label>
              <select id="sort-select" class="form-control" style="width:auto;" aria-label="Sort tasks">
                <option value="createdAt">Sort: Newest</option>
                <option value="dueDate">Sort: Due Date</option>
                <option value="priority">Sort: Priority</option>
                <option value="title">Sort: Title</option>
              </select>
            </div>
          </div>

          <!-- Task list -->
          <ul id="task-list" class="task-list" aria-live="polite" aria-label="Task list"></ul>

          <!-- Empty state -->
          <div id="empty-state" class="empty-state hidden" role="status">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
            </svg>
            <p>No tasks found. Add one above!</p>
          </div>

        </div><!-- /main-content -->

      </div><!-- /main-layout -->
    </div><!-- /container -->
  </main>


  <!-- ══════════════════════════════════════════════
       Footer
       ══════════════════════════════════════════════ -->
  <footer class="app-footer">
    <p>Todo App &mdash; all data stored locally in your browser.</p>
  </footer>

</div><!-- /app-wrapper -->


<!-- ── Notification toast ──────────────────────── -->
<div id="notification" class="notification" role="alert" aria-live="polite"></div>

<!-- ── Confirm modal ───────────────────────────── -->
<div id="confirm-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true"
     aria-labelledby="modal-heading" aria-hidden="true">
  <div class="modal-box">
    <h3 id="modal-heading">Confirm</h3>
    <p id="modal-message"></p>
    <div class="modal-actions">
      <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
      <button id="modal-ok"     class="btn btn-danger">Confirm</button>
    </div>
  </div>
</div>

<!-- ── Scripts (load order matters: utils → storage → app → ui) ── -->
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/ui.js"></script>
<script>
  // Bootstrap
  document.addEventListener('DOMContentLoaded', () => app.init());
</script>

</body>
</html>
